name: test_msec
model_type: FTModel2
scale: 1
num_gpu: 1 # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1: # the 1st test dataset
    name: ME
    type: PairedOneToManyBilateralDataset
    dataroot_gt: /root/autodl-tmp/MSEC/test/c/
    dataroot_lq: /root/autodl-tmp/MSEC/test/input/
    io_backend:
      type: disk

# network structures
network_g:
  type: RSNet
  n_vertices_3d: 17
  input_resolution: 256

# path
path:
  pretrain_network_g: /root/autodl-tmp/RSNet/experiments/MSEC_weights.pth
  param_key_g: params_ema
  strict_load_g: true

val:
  save_img: true
  suffix: ~ # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_pyiqa_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_pyiqa_ssim
      crop_border: 0